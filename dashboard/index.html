<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenOdds26 — Live Performance</title>
  <!-- React + ReactDOM + Babel via CDN (no build step, works offline-free on a Pi LAN) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js" crossorigin></script>
  <style>
    :root {
      --bg: #0c1018;
      --panel: #151b27;
      --panel2: #1c2433;
      --border: #2a3447;
      --text: #e6ebf2;
      --muted: #8b97ab;
      --accent: #4fd1c5;
      --good: #3ecf8e;
      --bad: #f06262;
      --warn: #f0b429;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      line-height: 1.45;
    }
    #root { max-width: 1080px; margin: 0 auto; padding: 16px; }
    .header { display: flex; flex-wrap: wrap; align-items: baseline; gap: 8px 16px; margin-bottom: 4px; }
    .header h1 { font-size: 22px; margin: 0; letter-spacing: 0.3px; }
    .header h1 .accent { color: var(--accent); }
    .subline { color: var(--muted); font-size: 13px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 18px; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--good); margin-right: 5px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    .banner { background: var(--panel2); border: 1px solid var(--border); border-left: 3px solid var(--warn);
              padding: 12px 14px; border-radius: 8px; color: var(--text); margin-bottom: 18px; font-size: 14px; }
    .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 22px; }
    .kpi { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
    .kpi .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.6px; }
    .kpi .value { font-size: 26px; font-weight: 600; margin-top: 4px; }
    .kpi .sub { color: var(--muted); font-size: 12px; margin-top: 2px; }
    .kpi .mkt { margin-top: 8px; border-top: 1px solid var(--border); padding-top: 6px; }
    .kpi .mkt-head { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); opacity: 0.7; margin-bottom: 3px; }
    .kpi .mkt-row { display: flex; justify-content: space-between; gap: 8px; font-size: 11px; line-height: 1.6; }
    .kpi .mkt-name { color: var(--muted); }
    .kpi .mkt-val { font-variant-numeric: tabular-nums; }
    .kpi .mkt-us .mkt-name, .kpi .mkt-us .mkt-val { color: var(--text); font-weight: 600; }
    .kpi .mkt-better .mkt-val { color: var(--good); }
    .kpi .mkt-worse .mkt-val { color: var(--bad); }
    h2 { font-size: 15px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin: 26px 0 10px; }
    .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 9px 10px; border-bottom: 1px solid var(--border); white-space: nowrap; }
    th { color: var(--muted); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; position: sticky; top: 0; background: var(--panel); z-index: 2; box-shadow: inset 0 -1px 0 var(--border); }
    tr.upcoming td { color: var(--muted); }
    tr.played { background: rgba(79,209,197,0.04); }
    .badge { display: inline-block; min-width: 18px; text-align: center; border-radius: 4px; padding: 1px 5px; font-weight: 700; font-size: 12px; }
    .badge.ok { background: rgba(62,207,142,0.16); color: var(--good); }
    .badge.no { background: rgba(240,98,98,0.16); color: var(--bad); }
    .pts { font-weight: 700; }
    .p1x2 { font-size: 11px; color: var(--muted); }
    .matchname { font-weight: 600; color: var(--text); }
    .flag { width: 17px; height: 13px; border-radius: 2px; margin-right: 5px; vertical-align: -2px; object-fit: cover; }
    .cal-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 12px; }
    .cal-cell { background: var(--panel2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
    .cal-cell .bk { font-size: 12px; color: var(--muted); }
    .cal-bar { height: 6px; border-radius: 3px; background: var(--border); margin-top: 8px; position: relative; overflow: hidden; }
    .cal-bar .fill { position: absolute; left: 0; top: 0; bottom: 0; }
    .forecast { display: grid; grid-template-columns: 1fr; gap: 0; }
    .frow { display: flex; align-items: center; gap: 10px; padding: 7px 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
    .frow:last-child { border-bottom: none; }
    .frow .rank { color: var(--muted); width: 18px; text-align: right; }
    .frow .rankmove { width: 26px; font-size: 11px; font-variant-numeric: tabular-nums; letter-spacing: -0.5px; }
    .frow .fname { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .frow .fbar { flex: 2; height: 7px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .frow .fbar .ffill { height: 100%; background: var(--accent); }
    .frow .fpct { width: 52px; text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; }
    .frow .move { width: 58px; text-align: right; font-size: 12px; font-variant-numeric: tabular-nums; }
    .mv-up { color: var(--good); }
    .mv-down { color: var(--bad); }
    .mv-flat { color: var(--muted); opacity: 0.45; }
    .err { color: var(--bad); text-align: center; padding: 40px; }
    .scroll { overflow: auto; max-height: 65vh; }
    a.kpi-link { color: var(--accent); text-decoration: none; border-bottom: 1px dotted var(--accent); }
    a.kpi-link:hover { opacity: 0.8; }
    tr.mdsep td { background: var(--panel2); color: var(--accent); font-size: 11px; font-weight: 700;
                  text-transform: uppercase; letter-spacing: 0.8px; padding: 6px 10px; }
    .prov { margin-top: 26px; }
    .prov-grid { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .prov-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px;
                padding: 9px 14px; border-bottom: 1px solid var(--border); font-size: 13px; }
    .prov-row:last-child { border-bottom: none; }
    .prov-row .k { color: var(--muted); }
    .prov-row .k em { font-style: normal; color: var(--text); opacity: 0.55; margin-left: 6px; }
    .prov-row .v { font-variant-numeric: tabular-nums; color: var(--text); }
    .prov-row .v small { color: var(--muted); margin-left: 8px; }
    .repo-link { text-align: center; margin-top: 22px; font-size: 13px; }
    .repo-link a { color: var(--accent); text-decoration: none; }
    .repo-link a:hover { text-decoration: underline; }
    .disclaimer { margin-top: 18px; border-top: 1px solid var(--border); padding-top: 14px;
                  color: var(--muted); font-size: 12px; line-height: 1.55; }
    .disclaimer p { margin: 0 0 8px; }
    .disclaimer p[dir="rtl"] { text-align: right; }
    /* knockout bracket */
    .bracket { display: flex; gap: 12px; overflow-x: auto; padding: 4px 2px 10px; }
    .bk-round { display: flex; flex-direction: column; justify-content: space-around; min-width: 150px; flex: 1 1 0; gap: 8px; position: relative; }
    .bk-rlabel { font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); text-align: center; margin-bottom: 2px; }
    .bk-match { background: var(--panel2); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 6px; padding: 6px 8px; position: relative; }
    .bk-round:not(.bk-champ-col) .bk-match::after { content: ""; position: absolute; left: 100%; top: 50%; width: 6px; height: 1px; background: var(--border); }
    .bracket > .bk-round:not(:first-child):not(.bk-champ-col) .bk-match::before { content: ""; position: absolute; right: 100%; top: 50%; width: 6px; height: 1px; background: var(--border); }
    .bk-tbd { border-left-color: var(--border); }
    .bk-date { font-size: 10px; color: var(--muted); margin-bottom: 3px; }
    .bk-side { display: flex; align-items: center; gap: 6px; font-size: 12px; padding: 2px 0; }
    .bk-team { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--muted); }
    .bk-fav .bk-team { color: var(--text); font-weight: 600; }
    .bk-bar { width: 32px; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; flex: none; }
    .bk-bar span { display: block; height: 100%; background: var(--muted); }
    .bk-fav .bk-bar span { background: var(--good); }
    .bk-pct { width: 30px; text-align: right; font-variant-numeric: tabular-nums; font-size: 11px; color: var(--muted); }
    .bk-fav .bk-pct { color: var(--text); }
    .bk-x2 { font-size: 10px; color: var(--muted); margin-top: 4px; padding-top: 3px; border-top: 1px solid var(--border); text-align: center; font-variant-numeric: tabular-nums; display: flex; flex-direction: column; gap: 1px; }
    .bk-xg { color: var(--muted); opacity: 0.85; }
    .bk-champ-col { justify-content: flex-start; padding-top: 18px; }
    .bk-champ { background: var(--panel2); border: 1px solid var(--warn); border-left: 3px solid var(--warn); border-radius: 8px; padding: 10px; text-align: center; }
    .bk-champ-sub { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); }
    .bk-champ-team { font-size: 15px; font-weight: 700; color: var(--warn); margin: 3px 0; }
    .bk-champ-pct { font-size: 11px; color: var(--muted); }
    .bk-third { margin-top: 18px; }
    /* collapsed group archive */
    details.archive { border: 1px solid var(--border); border-radius: 10px; background: var(--panel); margin-top: 6px; }
    details.archive > summary { cursor: pointer; padding: 12px 14px; color: var(--muted); font-size: 13px; list-style: none; }
    details.archive > summary::-webkit-details-marker { display: none; }
    details.archive > summary::before { content: "\25B8"; margin-right: 8px; }
    details.archive[open] > summary::before { content: "\25BE"; }
    details.archive[open] > summary { border-bottom: 1px solid var(--border); }
    @media (max-width: 600px) {
      .kpi .value { font-size: 22px; }
      th, td { padding: 7px 7px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, Fragment } = React;

    const REFRESH_MS = 60000;

    // Matchday boundaries (group stage): MD1 ≤ Jun 17, MD2 Jun 18–23, MD3 ≥ Jun 24.
    function matchdayOf(d) { return d <= "2026-06-17" ? 1 : (d <= "2026-06-23" ? 2 : 3); }
    const MD_LABEL = { 1: "Matchday 1", 2: "Matchday 2", 3: "Matchday 3" };

    const ISO = {
      algeria: "dz", argentina: "ar", australia: "au", austria: "at", belgium: "be",
      bosnia_and_herzegovina: "ba", brazil: "br", canada: "ca", cape_verde: "cv", colombia: "co",
      croatia: "hr", curacao: "cw", czech_republic: "cz", dr_congo: "cd", ecuador: "ec",
      egypt: "eg", england: "gb-eng", france: "fr", germany: "de", ghana: "gh",
      haiti: "ht", iran: "ir", iraq: "iq", ivory_coast: "ci", japan: "jp",
      jordan: "jo", mexico: "mx", morocco: "ma", netherlands: "nl", new_zealand: "nz",
      norway: "no", panama: "pa", paraguay: "py", portugal: "pt", qatar: "qa",
      saudi_arabia: "sa", scotland: "gb-sct", senegal: "sn", south_africa: "za", south_korea: "kr",
      spain: "es", sweden: "se", switzerland: "ch", tunisia: "tn", turkey: "tr",
      united_states: "us", uruguay: "uy", uzbekistan: "uz"
    };
    // Image flags (emoji flags don't render on Windows/Chromium); flagcdn is free + keyless.
    function Flag({ id }) {
      const c = ISO[id];
      if (!c) return null;
      return <img className="flag" src={"https://flagcdn.com/20x15/" + c + ".png"} alt="" loading="lazy" />;
    }

    function pct(x) { return x == null ? "—" : (x * 100).toFixed(0) + "%"; }
    function num(x, d) { return x == null ? "—" : Number(x).toFixed(d == null ? 3 : d); }
    function scoreStr(s) { return (s && s[0] != null) ? (s[0] + "-" + s[1]) : "—"; }
    function ilTime(d) {
      try {
        return d.toLocaleTimeString("en-GB", { timeZone: "Asia/Jerusalem",
          hour: "2-digit", minute: "2-digit", second: "2-digit" });
      } catch (e) { return d.toLocaleTimeString(); }
    }
    function predWinner(m) {
      if (m.pred_outcome === "home") return m.home;
      if (m.pred_outcome === "away") return m.away;
      return "Draw";
    }

    function Kpi({ label, value, sub, labelHref, market }) {
      const lab = labelHref
        ? <a className="kpi-link" href={labelHref} target="_blank" rel="noopener noreferrer">{label}</a>
        : label;
      return (
        <div className="kpi">
          <div className="label">{lab}</div>
          <div className="value">{value}</div>
          {sub ? <div className="sub">{sub}</div> : null}
          {market && market.rows ? (
            <div className="mkt">
              <div className="mkt-head">vs market · {market.n} shared games</div>
              {market.rows.map((b, i) => (
                <div key={i} className={"mkt-row " + (b.us ? "mkt-us" : b.bookBetter ? "mkt-better" : "mkt-worse")}>
                  <span className="mkt-name">{b.name}</span>
                  <span className="mkt-val">{b.text}</span>
                </div>
              ))}
            </div>
          ) : null}
        </div>
      );
    }

    function Badge({ val }) {
      if (val == null) return <span className="badge" style={{ color: "var(--muted)" }}>—</span>;
      return <span className={"badge " + (val ? "ok" : "no")}>{val ? "✓" : "✗"}</span>;
    }

    // Probability movement vs the pre-tournament baseline (percentage points).
    function ProbMove({ delta }) {
      if (delta == null) return <span className="mv-flat">·</span>;
      if (Math.abs(delta) < 0.1) return <span className="mv-flat">–</span>;
      const up = delta > 0;
      return <span className={up ? "mv-up" : "mv-down"}>{(up ? "▲" : "▼") + Math.abs(delta).toFixed(1) + "%"}</span>;
    }

    // Rank movement vs the baseline (positive = climbed the table).
    function RankMove({ d }) {
      if (d == null) return <span className="mv-flat"></span>;
      if (d === 0) return <span className="mv-flat">–</span>;
      const up = d > 0;
      return <span className={up ? "mv-up" : "mv-down"}>{(up ? "▲" : "▼") + Math.abs(d)}</span>;
    }

    function Calibration({ cal }) {
      const has = cal && cal.some(c => c.n > 0);
      if (!has) return null;
      return (
        <div>
          <h2>Calibration — favorite prob vs realized</h2>
          <div className="cal-grid">
            {cal.map((c, i) => (
              <div className="cal-cell" key={i}>
                <div className="bk">{c.bucket} &nbsp;·&nbsp; n={c.n}</div>
                <div style={{ marginTop: 6, fontSize: 14 }}>
                  pred <b>{pct(c.predicted)}</b> · real <b>{pct(c.realized)}</b>
                </div>
                <div className="cal-bar">
                  <div className="fill" style={{ width: pct(c.predicted), background: "var(--muted)" }}></div>
                </div>
                <div className="cal-bar">
                  <div className="fill" style={{ width: pct(c.realized), background: "var(--accent)" }}></div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function MatchTable({ matches }) {
      return (
        <div className="panel scroll">
          <table>
            <thead>
              <tr>
                <th>Date</th><th>Grp</th><th>Match</th><th>Pred</th><th>Score</th>
                <th>1X2</th><th>xG</th><th>Actual</th><th>Out</th><th>Exact</th>
              </tr>
            </thead>
            <tbody>
              {matches.map((m, i) => {
                const md = matchdayOf(m.date);
                const sep = i > 0 && md !== matchdayOf(matches[i - 1].date);
                return (
                  <Fragment key={i}>
                    {sep ? (
                      <tr className="mdsep"><td colSpan={10}>{MD_LABEL[md]} · from {m.date}</td></tr>
                    ) : null}
                    <tr className={m.played ? "played" : "upcoming"}>
                      <td>{m.date}</td>
                      <td>{m.group}</td>
                      <td className="matchname"><Flag id={m.home_id} />{m.home} v <Flag id={m.away_id} />{m.away}</td>
                      <td className="matchname">{predWinner(m)}</td>
                      <td>{scoreStr(m.pred_score)}</td>
                      <td className="p1x2">{pct(m.pred_1x2.h)}/{pct(m.pred_1x2.d)}/{pct(m.pred_1x2.a)}</td>
                      <td>{m.exp_goals ? m.exp_goals[0].toFixed(1) + "-" + m.exp_goals[1].toFixed(1) : "—"}</td>
                      <td>{scoreStr(m.actual_score)}</td>
                      <td><Badge val={m.outcome_correct} /></td>
                      <td><Badge val={m.exact_correct} /></td>
                    </tr>
                  </Fragment>
                );
              })}
            </tbody>
          </table>
        </div>
      );
    }

    function Forecast({ top10, genAt, isLive, conditioned, through }) {
      if (!top10 || !top10.length) return null;
      const max = top10[0].pct || 1;
      const heading = isLive
        ? "Forecast — title P(win) top 10 · LIVE"
        : "Forecast — title P(win) top 10";
      const note = isLive
        ? "live · conditioned on " + conditioned + " played group games"
          + (through ? " (through " + through + ")" : "")
          + " · ▲▼ vs pre-tournament forecast"
          + (genAt ? " · updated " + genAt : "")
        : (genAt ? "forecast frozen at " + genAt : null);
      return (
        <div>
          <h2>{heading}</h2>
          <div className="panel forecast">
            {top10.map((t, i) => (
              <div className="frow" key={i}>
                <span className="rank">{i + 1}</span>
                <span className="rankmove"><RankMove d={t.rank_delta} /></span>
                <span className="fname"><Flag id={t.id} />{t.team}</span>
                <span className="fbar"><span className="ffill" style={{ width: (t.pct / max * 100) + "%" }}></span></span>
                <span className="fpct">{t.pct.toFixed(1)}%</span>
                <span className="move"><ProbMove delta={t.delta_pct} /></span>
              </div>
            ))}
          </div>
          {note ? <div className="subline" style={{ marginTop: 8 }}>{note}</div> : null}
        </div>
      );
    }

    function Provenance({ data }) {
      const md = data.matchday_pred_dates || {};
      const fmtDates = (n) => {
        const arr = md[n];
        if (!arr || !arr.length) return data.predictions_as_of || "—";
        return arr.join(" + ");
      };
      const windows = [
        { n: 1, md: "Matchday 1 predictions", range: "Jun 11–17" },
        { n: 2, md: "Matchday 2 predictions", range: "Jun 18–23" },
        { n: 3, md: "Matchday 3 predictions", range: "Jun 24–27" },
      ];
      return (
        <div className="prov">
          <h2>Data &amp; generation</h2>
          <div className="prov-grid">
            <div className="prov-row">
              <span className="k"><span className="dot"></span>Status</span>
              <span className="v">{data.forecast_is_live ? "LIVE" : "frozen"}</span>
            </div>
            <div className="prov-row">
              <span className="k">Title forecast — pre-tournament</span>
              <span className="v">{data.pretournament_forecast_generated_at || "—"}</span>
            </div>
            <div className="prov-row">
              <span className="k">Title forecast — live</span>
              <span className="v">{data.forecast_generated_at || "—"}
                {data.forecast_conditioned_through
                  ? <small>conditioned through {data.forecast_conditioned_through}</small> : null}</span>
            </div>
            {windows.map((w, i) => (
              <div className="prov-row" key={i}>
                <span className="k">{w.md}<em>{w.range}</em></span>
                <span className="v">{fmtDates(w.n)}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function Disclaimer() {
      return (
        <div className="disclaimer">
          <p>This is a non-commercial, free-to-use research project — an experimental statistical
          model published for research and educational purposes only. It is not affiliated with,
          endorsed by, sponsored by, or connected in any form to Bet365, Pinnacle, or any other
          betting operator or commercial entity; bookmaker names are used solely to identify
          publicly available odds for comparison, and all trademarks belong to their respective
          owners. It is not betting or financial advice and does not endorse, promote, or solicit
          gambling or wagering of any kind. Forecasts are probabilistic, carry significant
          uncertainty, and are frequently wrong. Any use of this information is entirely at your own
          risk.</p>
          <p dir="rtl" lang="he">זהו פרויקט מחקרי לא־מסחרי וחופשי לשימוש — מודל סטטיסטי ניסיוני
          המתפרסם למטרות מחקר ולימוד בלבד. הוא אינו מסונף, אינו נתמך, אינו ממומן ואינו קשור בכל צורה
          שהיא ל-Bet365, ל-Pinnacle או לכל גוף הימורים או גוף מסחרי אחר; שמות חברות ההימורים משמשים
          אך ורק לזיהוי יחסי ההימורים (odds) הזמינים לציבור לצורך השוואה, וכל הסימנים המסחריים שייכים
          לבעליהם. אין לראות בו ייעוץ להימורים או ייעוץ פיננסי, והוא אינו מעודד, מקדם או משדל לבצע
          הימורים מכל סוג שהוא. התחזיות הן הסתברותיות, כרוכות באי־ודאות רבה, ולעיתים קרובות שגויות.
          כל שימוש במידע זה הוא על אחריותך בלבד.</p>
        </div>
      );
    }

    function KoSide({ tid, name, p, fav }) {
      return (
        <div className={"bk-side" + (fav ? " bk-fav" : "")}>
          <span className="bk-team"><Flag id={tid} />{name}</span>
          <span className="bk-bar"><span style={{ width: p + "%" }}></span></span>
          <span className="bk-pct">{p}%</span>
        </div>
      );
    }

    function Bracket({ ko, champ }) {
      if (!ko || !ko.rounds) return null;
      const ORDER = ["R32", "R16", "QF", "SF", "Final"];
      const LABEL = { R32: "Round of 32", R16: "Round of 16", QF: "Quarter-finals", SF: "Semi-finals", Final: "Final" };
      const hasThird = (ko.rounds.third_place || []).length > 0;
      return (
        <div>
          <h2>Knockout bracket — P(advance)</h2>
          <div className="bracket">
            {ORDER.map(r => {
              const ms = ko.rounds[r] || [];
              return (
                <div className="bk-round" key={r}>
                  <div className="bk-rlabel">{LABEL[r]} {ms.length > 1 ? "(" + ms.length + ")" : ""}</div>
                  {ms.map((m, i) => {
                    if (r !== "R32") {
                      return (
                        <div className="bk-match bk-tbd" key={i}>
                          <div className="bk-side"><span className="bk-team">TBD</span></div>
                          <div className="bk-side"><span className="bk-team">TBD</span></div>
                        </div>
                      );
                    }
                    const ph = Math.round(m.p_home_adv * 100);
                    const x = m.p_1x2_120 || m.p_1x2_90 || [0, 0, 0];
                    const xg = m.xg || null;
                    return (
                      <div className="bk-match" key={i}>
                        {m.date ? <div className="bk-date">{m.date.slice(5)}</div> : null}
                        <KoSide tid={m.home} name={m.home_name} p={ph} fav={m.p_home_adv >= m.p_away_adv} />
                        <KoSide tid={m.away} name={m.away_name} p={100 - ph} fav={m.p_away_adv > m.p_home_adv} />
                        <div className="bk-x2">
                          <span title="full-time result incl. extra time (draw = penalties)">1X2 {Math.round(x[0] * 100)}% / {Math.round(x[1] * 100)}% / {Math.round(x[2] * 100)}%</span>
                          {xg ? <span className="bk-xg">xG {xg[0]}–{xg[1]}</span> : null}
                        </div>
                      </div>
                    );
                  })}
                </div>
              );
            })}
            <div className="bk-round bk-champ-col">
              <div className="bk-rlabel">Champion</div>
              <div className="bk-champ">
                <div className="bk-champ-sub">model favourite</div>
                <div className="bk-champ-team">{champ ? <span><Flag id={champ.id} />{champ.team}</span> : "TBD"}</div>
                {champ ? <div className="bk-champ-pct">{champ.pct}% to win</div> : null}
              </div>
              {hasThird ? (
                <div className="bk-third">
                  <div className="bk-rlabel">3rd place</div>
                  <div className="bk-match bk-tbd">
                    <div className="bk-side"><span className="bk-team">TBD</span></div>
                    <div className="bk-side"><span className="bk-team">TBD</span></div>
                  </div>
                </div>
              ) : null}
            </div>
          </div>
          <div className="subline" style={{ marginTop: 8 }}>
            Single elimination · P(advance) includes extra time + penalties · 90′ line = home/draw/away · later rounds fill in as R32 is played
          </div>
        </div>
      );
    }

    function App() {
      const [data, setData] = useState(null);
      const [error, setError] = useState(null);
      const [lastFetch, setLastFetch] = useState(null);

      function load() {
        fetch("./performance.json?t=" + Date.now())
          .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
          .then(d => { setData(d); setError(null); setLastFetch(new Date()); })
          .catch(e => setError(e.message));
      }

      useEffect(() => {
        load();
        const id = setInterval(load, REFRESH_MS);
        return () => clearInterval(id);
      }, []);

      if (error && !data) {
        return <div className="err">Waiting for data… ({error})</div>;
      }
      if (!data) {
        return <div className="err">Loading…</div>;
      }

      const t = data.tournament || {};
      const k = data.kpis || {};
      const n = k.n_played || 0;

      // Bookmaker sub-lines per KPI: value + signed delta vs us on the same games.
      // accuracy: delta in pp (book>us = book better); log-loss/brier: lower = better.
      const mkt = data.kpis_market || {};
      const BOOKS = ["Bet365", "Pinnacle"];
      const fmtV = (v, kind) => kind === "acc" ? pct(v) : v.toFixed(3);
      const fmtD = (d, kind) => (d >= 0 ? "+" : "") + (kind === "acc" ? (d * 100).toFixed(1) + "pp" : d.toFixed(3));
      // Returns {n, rows}: our value on the SAME games + each book's value with a
      // delta vs us — so it's a like-for-like comparison, not vs the headline KPI
      // (which spans all played games, including ones with no odds yet).
      function mlines(valKey, dKey, modelKey, kind) {
        const present = BOOKS.filter(b => mkt[b]);
        if (!present.length) return null;
        const m0 = mkt[present[0]];
        const rows = [{ name: "OpenOdds26", text: fmtV(m0[modelKey], kind), us: true }];
        present.forEach(b => {
          const m = mkt[b], d = m[dKey];
          // book better than us on this metric (acc: higher; log-loss/brier: lower)
          const bookBetter = kind === "acc" ? d > 0 : d < 0;
          rows.push({ name: b, text: fmtV(m[valKey], kind) + " (" + fmtD(d, kind) + ")", bookBetter });
        });
        return { n: m0.n, rows };
      }

      return (
        <div>
          <div className="header">
            <h1><span className="accent">OpenOdds26</span> — Live Performance</h1>
          </div>
          <div className="subline">
            <span>Games played <b>{t.games_played}</b> / {t.games_total}</span>
            <span>last updated {data.generated_at} <span style={{ opacity: 0.7 }}>(Israel time)</span></span>
            <span><span className="dot"></span>auto-refresh 60s{lastFetch ? " · polled " + ilTime(lastFetch) : ""}</span>
          </div>

          {n === 0 ? (
            <div className="banner">Tournament starts June 11 — awaiting first result. Predictions below are frozen and will be scored as results arrive.</div>
          ) : null}

          <div className="kpis">
            <Kpi label="1X2 Accuracy" value={n ? pct(k.accuracy_1x2) : "—"} sub={n ? n + " games" : "no games yet"}
                 market={n ? mlines("accuracy_1x2", "d_accuracy_1x2", "model_accuracy_1x2", "acc") : null} />
            <Kpi label="Model Exact Score" value={n ? pct(k.model_exact_rate) : "—"} sub="modal score hit rate" />
            <Kpi label="Mean Log-Loss" value={n ? num(k.mean_log_loss) : "—"} sub="lower is better"
                 labelHref="https://en.wikipedia.org/wiki/Loss_functions_for_classification"
                 market={n ? mlines("mean_log_loss", "d_mean_log_loss", "model_mean_log_loss", "ll") : null} />
            <Kpi label="Mean Brier" value={n ? num(k.mean_brier) : "—"} sub="lower is better"
                 labelHref="https://en.wikipedia.org/wiki/Brier_score"
                 market={n ? mlines("mean_brier", "d_mean_brier", "model_mean_brier", "ll") : null} />
          </div>

          {data.knockout ? <Bracket ko={data.knockout} champ={data.forecast_top10 && data.forecast_top10[0]} /> : null}

          {data.knockout ? (
            <details className="archive">
              <summary>Group stage — {data.tournament ? data.tournament.games_total : 72} games (complete) · scored above</summary>
              <MatchTable matches={data.matches || []} />
            </details>
          ) : (
            <React.Fragment>
              <h2>Matches</h2>
              <MatchTable matches={data.matches || []} />
            </React.Fragment>
          )}

          <Forecast top10={data.forecast_top10} genAt={data.forecast_generated_at}
                    isLive={data.forecast_is_live}
                    conditioned={data.forecast_games_conditioned}
                    through={data.forecast_conditioned_through} />

          <Provenance data={data} />

          <Calibration cal={data.calibration} />

          <div className="subline" style={{ marginTop: 24, justifyContent: "center" }}>
            Scoring only — the model is frozen and never re-run here.
          </div>

          <div className="repo-link">
            <a href="https://github.com/andreskoenig/OpenOdds26" target="_blank" rel="noopener noreferrer">
              OpenOdds26 — a Dixon-Coles + Monte-Carlo World Cup model · code &amp; methodology on GitHub ↗
            </a>
          </div>

          <Disclaimer />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
